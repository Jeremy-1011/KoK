<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Chat App</h2>
    <div class="channels">
      <div class="channel active" data-channel="general"># general</div>
      <div class="channel" data-channel="gaming"># gaming</div>
      <div class="channel" data-channel="tech"># tech</div>
    </div>
  </div>

  <!-- Main chat -->
  <div class="chat-container">

    <div class="chat-header">
      # general
    </div>

    <div id="messages" class="messages"></div>

    <form id="form" class="input-area">
      <input id="input" autocomplete="off" placeholder="Message #general" />
      <button>Send</button>
    </form>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
