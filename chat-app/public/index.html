<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KoK Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Left sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">CHANNELS</div>
      <div id="channels" class="nav-list">
        <div class="channel nav-item active" data-channel="general"># general</div>
      </div>
      <div class="sidebar-actions">
        <button id="addChannel">+ Add</button>
        <button id="deleteChannel" class="danger">🗑 Delete</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">DIRECT MESSAGES</div>
      <div id="dm-list" class="nav-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">ONLINE — <span id="online-count">0</span></div>
      <div id="online-list" class="nav-list online-list"></div>
    </div>

    <div class="sidebar-footer">
      <div class="user-info">
        <img id="my-pfp" class="my-pfp" src="/default-avatar.svg" />
        <span id="my-username" class="my-username"></span>
        <button class="logout-btn" onclick="logout()" title="Log out">↩</button>
      </div>
      <label class="pfp-label" title="Set profile picture">
        🖼 Set Avatar
        <input type="file" id="pfpInput" accept="image/*" />
      </label>
    </div>
  </div>

  <!-- Main chat area -->
  <div class="chat-container">
    <div class="chat-header" id="chat-header"># general</div>
    <div id="messages" class="messages"></div>
    <div id="typing-indicator" class="typing-indicator"></div>
    <div class="input-area">
      <label class="attach-btn" title="Attach file">
        📎
        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.zip" />
      </label>
      <div id="file-preview" class="file-preview hidden">
        <span id="file-preview-name"></span>
        <button type="button" id="clearFile">✕</button>
      </div>
      <form id="form">
        <input id="input" autocomplete="off" placeholder="Message #general" />
        <button>Send</button>
      </form>
    </div>
  </div>

</div>

<!-- Emoji reaction picker -->
<div id="emoji-picker" class="emoji-picker hidden">
  <span class="emoji-opt" data-emoji="👍">👍</span>
  <span class="emoji-opt" data-emoji="❤️">❤️</span>
  <span class="emoji-opt" data-emoji="😂">😂</span>
  <span class="emoji-opt" data-emoji="😮">😮</span>
  <span class="emoji-opt" data-emoji="😢">😢</span>
  <span class="emoji-opt" data-emoji="🔥">🔥</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
