<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discord-like Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="sidebar">
    <h2>Chat App</h2>
    <div id="channels" class="channels">
      <div class="channel active" data-channel="general"># general</div>
    </div>
    <button id="addChannel">Add Channel</button>
    <button id="deleteChannel">Delete Channel</button>
    <label class="pfp-label" title="Set profile picture">
      🖼 Set Avatar
      <input type="file" id="pfpInput" accept="image/*" />
    </label>
  </div>

  <div class="chat-container">
    <div class="chat-header"># general</div>
    <div id="messages" class="messages"></div>
    <div id="typing-indicator" class="typing-indicator"></div>
    <div class="input-area">
      <label class="attach-btn" title="Attach file">
        📎
        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.zip" />
      </label>
      <div id="file-preview" class="file-preview hidden">
        <span id="file-preview-name"></span>
        <button type="button" id="clearFile">✕</button>
      </div>
      <form id="form">
        <input id="input" autocomplete="off" placeholder="Message #general" />
        <button>Send</button>
      </form>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
